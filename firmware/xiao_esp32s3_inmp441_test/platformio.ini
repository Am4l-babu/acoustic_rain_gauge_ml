; PlatformIO project: XIAO ESP32-S3 + INMP441 I2S microphone bring-up test
; Board: Seeed Studio XIAO ESP32-S3 (plain or Sense variant, both work identically here)
;
; Platform version is PINNED to 6.9.0 (Arduino-ESP32 core 2.0.17) on purpose.
; That core still ships the classic, widely-documented "driver/i2s.h" legacy
; I2S API used in main.cpp. Newer cores (Arduino-ESP32 3.x / ESP-IDF 5.x)
; replace it with driver/i2s_std.h — see docs/inmp441_i2s_std_example.cpp
; in the main documentation for that variant if you upgrade the platform.

[env:xiao_esp32s3]
platform = espressif32@6.9.0
board = seeed_xiao_esp32s3
framework = arduino

; --- PSRAM (8MB Octal PSRAM on-board) ---
board_build.psram = enabled
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; --- Serial monitor / upload ---
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, colorize

; --- Capture mode select (also settable in src/main.cpp) ---
; 0 = level meter (human-readable dBFS, default, safe first test)
; 1 = raw PCM stream (binary int16 samples for tools/serial_to_wav.py)
build_unflags =
